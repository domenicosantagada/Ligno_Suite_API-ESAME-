version: '3.8'

services:
  # 1. Database PostgreSQL
  db:
    image: postgres:alpine
    container_name: lignosuite-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: lignosuitedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # FONDAMENTALE: Passiamo il dump a Postgres che creerà le tabelle all'avvio
      - ./database/lignosuitedb_dump.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Backend Spring Boot (Costruito dalla cartella corrente '.')
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lignosuite-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/lignosuitedb
      - SPRING_PROFILES_ACTIVE=secret
    depends_on:
      db:
        condition: service_healthy

  # 3. Frontend Angular (Costruito dalla cartella a fianco '../')
  frontend:
    build:
      # Cerca il frontend salendo di un livello
      context: ../Ligno_Suite_-ESAME-
      dockerfile: Dockerfile
    container_name: lignosuite-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
