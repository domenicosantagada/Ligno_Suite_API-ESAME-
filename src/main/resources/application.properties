# Nome dell'applicazione
spring.application.name=tool-falegnameria-api
# Configurazione Database H2 (in questo modo i dati vengono salvati in memoria)
#spring.datasource.url=jdbc:h2:mem:falegnameriadb
# Configurazione Database H2 con file locale
spring.datasource.url=jdbc:h2:file:./data/falegnameriadb
# per accedere dal browser all'applicazione h2
# http://localhost:8080/h2-console
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=pa
# Permette di vedere la console del database nel browser
spring.h2.console.enabled=true
# Sincronizza le tabelle del DB con le classi Java (Entity) automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
